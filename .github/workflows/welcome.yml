# =====================================================================
#  Welcome emails — envoie un mail de bienvenue aux nouveaux abonnés.
#  Tourne toutes les ~15 min (GitHub peut décaler un peu) + bouton manuel.
#  Les secrets sont dans : repo > Settings > Secrets and variables > Actions.
# =====================================================================
name: Welcome emails

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # permet de lancer à la main depuis l'onglet Actions

# Évite deux envois simultanés si un run déborde sur le suivant.
concurrency:
  group: welcome-emails
  cancel-in-progress: false

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # welcome.mjs n'a besoin que de nodemailer (dépendance), pas des devDeps.
      - run: npm ci --omit=dev

      - run: node newsletter/welcome.mjs
        env:
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          NEWSLETTER_FROM:     ${{ secrets.NEWSLETTER_FROM }}
          SITE_URL:            ${{ secrets.SITE_URL }}
          ADMIN_TOKEN:         ${{ secrets.ADMIN_TOKEN }}
          ALTCHA_HMAC_KEY:     ${{ secrets.ALTCHA_HMAC_KEY }}
