<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Playground — eau irisée (Perlin)</title>
  <style>
    /* Ton playground d'eau, conservé tel quel. */
    html, body { margin: 0; height: 100%; background: linear-gradient(blue, rgb(0, 200, 255)); overflow: hidden; }
    #water {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      filter: blur(20px) saturate(1.8);   /* fond les pixels -> matière lisse */
    }
  </style>
</head>
<body>
  <canvas id="water"></canvas>
  <script src="water.js"></script>
</body>
</html>
